<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scegli Libro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="/syles/index.css">
</head>

<body>
    <header>
        <!--------------NAVBAR---------------->
        <nav class="navbar navbar-expand-lg bg-dark navbar-dark">
            <div class="container-fluid">
                <img class="immagine-papera" src="/img/duck.png" alt="immagine papera">
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
                    data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent"
                    aria-expanded="false" aria-label="Toggle navigation">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="navbarSupportedContent">
                    <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                        <li class="nav-item">
                            <a class="nav-link active" aria-current="page" href="#">Catalogo Libri</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="#">Anagrafica Utenti</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link " href="#">Storico Prestiti</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link " href="#">Help</a>
                        </li>
                    </ul>
                </div>
            </div>
        </nav>
        <!--------------FINE NAVBAR------------------>
    </header>

    <main>
        <div class="container">
            <div class="row">
                <section class="mt-3">
                    <h3>Nuovo libro</h3>
                    <div class="d-flex pt-3">
                        <div class="col-6 me-3">
                            <form action="url">
                                <h5>Nome Autore</h5>
                                <input class="form-control" type="text" placeholder="Inserisci nome dell'autore"
                                    aria-label="Inserisci il nome">
                            </form>
                        </div>
                        <div class="col-6 me-1">
                            <form action="url">
                                <h5>Cognome Autore</h5>
                                <input class="form-control" type="text" placeholder="Inserisci il cognome"
                                    aria-label="Inserisci il cognome">
                            </form>
                        </div>
                    </div>
                </section>
            </div>

            <div class="row">
                <div class="col-12">
                    <section class="mt-3">
                        <h3>Titolo</h3>
                        <form action="url">
                            <input class="form-control" type="text" placeholder="Inserisci il titolo del libro"
                                aria-label="Inserisci il titolo del libro">
                            <p class="text-secondary">Titolo versione italiana</p>
                        </form>
                    </section>
                </div>
            </div>
        </div>
    </main>





















    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</body>

</html>
