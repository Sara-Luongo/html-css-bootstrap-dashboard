<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scegli Libro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="/syles/index.css">
</head>

<body>
    <header>
        <!--------------NAVBAR---------------->
        <nav class="navbar navbar-expand-lg bg-dark navbar-dark">
            <div class="container-fluid">
                <img class="immagine-papera" src="/img/duck.png" alt="immagine papera">
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
                    data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent"
                    aria-expanded="false" aria-label="Toggle navigation">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="navbarSupportedContent">
                    <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                        <li class="nav-item">
                            <a class="nav-link active" aria-current="page" href="#">Catalogo Libri</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="#">Anagrafica Utenti</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link " href="#">Storico Prestiti</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link " href="#">Help</a>
                        </li>
                    </ul>
                </div>
            </div>
        </nav>
        <!--------------FINE NAVBAR------------------>
    </header>

    <main>
        <div class="container mt-3">
            <h3>Nuovo libro</h3>
            <form action="url">
                <div class="row mt-3">
                    <div class="col-6">
                        <label for="nome-autore">Nome Autore</label>
                        <input id="nome-autore" class="form-control" type="text"
                            placeholder="Inserisci nome dell'autore">
                    </div>
                    <div class="col-6">
                        <label for="cognome-autore">Cognome Autore</label>
                        <input id="cognome-autore" class="form-control" type="text"
                            placeholder="Inserisci cognome dell'autore">
                    </div>
                </div>
                <!--input titolo libro-->
                <div class="row mt-3">
                    <div class="col-12">
                        <label for="titolo">Titolo</label>
                        <input id="titolo" class="form-control" type="text" placeholder="Inserisci il titolo del libro">
                        <div class="form-text">Titolo versione italiana</div>
                    </div>
                </div>
                <!--select genere-->
                <div class="row mt-3">
                    <div class="col-12 col-lg-4">
                        <label for="genere" class="form-label">Genere</label>
                        <select id="genere" class="form-select">
                            <option selected disabled>Scegli genere</option>
                            <option selected>Uomo</option>
                            <option selected>Donna</option>
                        </select>
                    </div>
                    <!--data anno pubblicazione-->
                    <div class="mt-3 col-12 col-lg-4">
                        <label for="anno-pubblicazione">Anno di pubblicazione</label>
                        <input id="anno-pubblicazione" class="form-control" type="date"
                            placeholder="Inserisci anno di pubblicazione">
                    </div>
                    <!--ISBN#-->
                    <div class="mt-3 col-12 col-lg-4">
                        <label for="ISBN#">ISBN#</label>
                        <input id="ISBN#" class="form-control" type="text" placeholder="Inserisci il codice SBN#">
                    </div>
                </div>
                <!--input note-->
                <div class="row mt-3">
                    <div class="col-12">
                        <label for="note">Note</label>
                        <textarea class="form-control" placeholder="Inserisci eventuali note qui" id="note"
                            style="height: 100px"></textarea>
                    </div>

                    <!--checkmark-->
                    <div class="col mt-3">
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" value="" id="checkDefault">
                            <label class="form-check-label" for="checkDefault">
                                Disponibile anche in digitale
                            </label>
                        </div>
                    </div>
                    <div class="mt-2">
                        <input class="btn btn-primary" type="submit" value="Aggiungi libro">
                    </div>
                </div>
        </div>
        </form>
        </div>

    </main>



    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</body>

</html>
